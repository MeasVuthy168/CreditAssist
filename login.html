
<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <title>ចូលប្រើកម្មវិធី</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d2d5c" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d2d5c;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0d2d5c;
      color: white;
      border: none;
    }
    .error { color: red; }
  </style>
</head>

<body>

<div class="login-box">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div class="error" id="error-msg"></div>
</div>

<script src="config.js"></script>

<script>
console.log("LOGIN CONFIG =", window.CONFIG);

async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorMsg = document.getElementById("error-msg");

  const API_BASE = window.CONFIG?.BASE_URL || "";

  console.log("LOGIN API_BASE =", API_BASE);
  console.log("LOGIN username =", username);

  try {
    const res = await fetch(`${API_BASE}/api/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    console.log("LOGIN status =", res.status);
    console.log("LOGIN response =", data);

    if (res.ok && data.success) {
      sessionStorage.setItem("token", data.token);

      console.log("LOGIN token saved =", data.token);

      sessionStorage.setItem("loggedInUser", JSON.stringify({
        token: data.token,
        username: data.username,
        fullname: data.fullname
      }));

      console.log("LOGIN session =", sessionStorage.getItem("loggedInUser"));

      window.location.href = "ArreasT24/index.html";
    } else {
      errorMsg.textContent = data.message || "Login failed";
    }
  } catch (e) {
    console.error("LOGIN ERROR =", e);
    errorMsg.textContent = "Server error";
  }
}
</script>

</body>
</html>
